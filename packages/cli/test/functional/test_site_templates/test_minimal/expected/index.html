<!DOCTYPE html>
<html>

<head>
  <script>
      (function() {
        const storageKey = 'markbind-theme';
        const darkTheme = 'dark';
        const lightTheme = 'light';
        let resolvedTheme = 'dark';

        try {
          const storedTheme = localStorage.getItem(storageKey);
          if (storedTheme === darkTheme || storedTheme === lightTheme) {
            resolvedTheme = storedTheme;
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            resolvedTheme = darkTheme;
          } else {
            resolvedTheme = lightTheme;
          }
        } catch (error) {
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            resolvedTheme = darkTheme;
          }
        }

        document.documentElement.setAttribute('data-bs-theme', resolvedTheme);
        window.__MARKBIND_THEME__ = resolvedTheme;
      }());
    </script>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <link rel="stylesheet" href="/markbind/css/markbind.min.css">
  <link rel="stylesheet" href="/plugins/markbind-plugin-anchors/markbind-plugin-anchors.css">
  <link rel="stylesheet" href="/plugins/markbind-plugin-tree/markbind-plugin-tree.css">
  <script>
      (function() {
        const theme = window.__MARKBIND_THEME__ || 'dark';
        const lightStylesheet = document.getElementById('markbind-highlight-light');
        const darkStylesheet = document.getElementById('markbind-highlight-dark');

        if (lightStylesheet && darkStylesheet) {
          lightStylesheet.disabled = theme !== 'light';
          darkStylesheet.disabled = theme !== 'dark';
        }
      }());
    </script>
